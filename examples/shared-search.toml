# Common settings used by search-server.exe, search-client.exe, and build-index.exe.
# Copy this file next to the exe files as shared-search.toml, or pass it with --config.

shared_root = "shared_demo"

# Root directory containing dataset index folders.
# If this file is copied next to target/release/search-server.exe and you want the
# project-level indexes folder, use: indexes_root = "../../indexes"
indexes_root = "indexes"
dataset_id = "contracts"

# Optional vector/embedding settings. Relative paths are resolved from this TOML file.
# Use these when model files are stored outside the index, for example on a server-local SSD.
# embedding_model = "models/ruri-v3-onnx/model.onnx"
# tokenizer = "models/ruri-v3-onnx/tokenizer.json"
# ort_dll = "models/ruri-v3-onnx/onnxruntime.dll"
# embedding_dim = 768
# max_input_tokens = 512
# embedding_model_id = "ruri-v3-onnx"
# query_prefix = "検索クエリ: "
# document_prefix = "検索文書: "
# preload_model_to_memory = false

# Optional build-index chunking defaults.
# chunk_mode = "smart"
# chunk_size = 1200
# chunk_overlap = 200

# Server settings
poll_seconds = 2
done_ttl_secs = 600
failed_ttl_secs = 86400
cleanup_interval_secs = 60

# Client settings
no_open = false
keep_responses = false
default_top_k = 20
request_timeout_secs = 60
browser_shutdown_secs = 30
search_poll_interval_ms = 300
client_port = 0
