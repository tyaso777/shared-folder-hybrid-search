name: Dependency Audit

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  vulnerabilities:
    name: Vulnerability scan
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8"
    with:
      scan-args: |-
        --recursive
        ./
    permissions:
      actions: read
      contents: read
      security-events: write

  rust-licenses:
    name: Rust licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans sources

  python:
    name: Python export-tool licenses and vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/onnx-export-requirements.txt"
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit pip-licenses
      - name: Check Python vulnerabilities
        run: |
          pip-audit -r scripts/onnx-export-requirements.txt \
            --ignore-vuln PYSEC-2025-211 \
            --ignore-vuln PYSEC-2025-212 \
            --ignore-vuln PYSEC-2025-213 \
            --ignore-vuln PYSEC-2025-214 \
            --ignore-vuln PYSEC-2025-215 \
            --ignore-vuln PYSEC-2025-216 \
            --ignore-vuln PYSEC-2025-217 \
            --ignore-vuln PYSEC-2025-218 \
            --ignore-vuln CVE-2026-1839
      - name: Install Python export dependencies for license scan
        run: |
          python -m venv .venv-license
          .venv-license/bin/python -m pip install --upgrade pip
          .venv-license/bin/python -m pip install pip-licenses
          .venv-license/bin/python -m pip install -r scripts/onnx-export-requirements.txt
      - name: Check Python licenses
        run: |
          .venv-license/bin/python -m piplicenses \
            --format=markdown \
            --with-authors \
            --with-urls \
            --fail-on="GPL;AGPL;LGPL;SSPL"
